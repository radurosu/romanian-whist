  for(let p=0;p<G.numPlayers;p++)html+=`<td>${G.scores[p]}</td>`;
  html+=`</tr></table><button class="btn" style="margin-top:15px" onclick="removeOverlays()">Close</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

// ─── Rendering ───
function renderAll() {
  if(!G||!G.numPlayers||!G.roundSequence) return;
  renderScoreboard();
  renderOpponents();
  renderCenter();
  renderHand();
  renderActionBar();
  // Remote clients: show overlays when phase changes
  if(MP.active&&!MP.isHost){
    if(G.phase==='roundResult'&&!document.getElementById('round-overlay')){
      const last=G.roundHistory[G.roundHistory.length-1];
      if(last) showRoundResult(last.roundScores);
    }
    if(G.phase==='gameOver'&&!document.getElementById('gameover-overlay')) showGameOver();
  }
}

function renderScoreboard() {
  const el=document.getElementById('scoreboard');
  const mobile=window.innerWidth<=600, seat=MP.mySeat;
  let html=`<span class="round-info">R${G.currentRoundIndex+1}/${G.roundSequence.length}</span>`;
  if(!mobile)html+=`<span>Cards: ${G.cardsPerPlayer}</span>`;
  html+=`<span class="trump-display">Trump: `;
  if(G.trumpSuit){const col=SUIT_COLOR[G.trumpSuit]==='red'?'#d32f2f':'#fff';html+=`<span style="color:${col};font-size:${mobile?'14':'22'}px">${SUIT_SYMBOL[G.trumpSuit]}</span>`;}
  else html+=`<span style="opacity:0.6">NT</span>`;
  html+=`</span>`;
  if(!mobile){html+=`<span style="opacity:0.4">|</span><span>Dealer: ${G.playerNames[G.dealerIndex]}</span>`;}
  html+=`<span style="opacity:0.4">|</span>`;
  for(let p=0;p<G.numPlayers;p++){
    html+=`<span class="score-entry ${p===seat?'human':''}">`;
    const fullName=G.playerNames[p];
    const face=p===seat?'🐺':(MP.active&&!isAIPlayer(p)?'🙂':getFace(fullName));
    html+=`${face}${mobile?fullName.slice(0,3):fullName}:${G.scores[p]}`;
    if(G.bids[p]!==null){html+=`<span class="bid-info"> ${G.biddingComplete?G.tricksWon[p]:G.bids[p]}`;if(G.biddingComplete)html+=`/${G.bids[p]}`;html+=`</span>`;}
    html+=`</span>`;
  }
  el.innerHTML=html;
}

function renderOpponents() {
  for(const id of ['west-area','north-area','east-area']) document.getElementById(id).innerHTML='';
  const n=G.numPlayers, mySeat=MP.mySeat;
  for(let slot=1;slot<n;slot++){
    const realSeat=(mySeat+slot)%n;
    const area=document.getElementById(OPPONENT_AREAS[n][slot]);
    const isActive=G.phase==='bidding'?G.currentBidderIndex===realSeat:G.phase==='playing'?currentPlayerToAct()===realSeat:false;
    const isLeader=G.phase==='playing'&&G.trickLeaderIndex===realSeat&&G.currentTrick.length===0;
    const isHuman=MP.active&&!isAIPlayer(realSeat);
    const face=isHuman?'🙂':getFace(G.playerNames[realSeat]);
    let label=`<div class="player-label ${isActive?'active-player':''} ${isLeader?'trick-leader':''}">${face} ${G.playerNames[realSeat]}`;
    if(G.bids[realSeat]!==null){label+=` <span style="opacity:0.7">(${G.biddingComplete?G.tricksWon[realSeat]:G.bids[realSeat]}`;if(G.biddingComplete)label+=`/${G.bids[realSeat]}`;label+=`)</span>`;}
    label+=`</div>`;
    area.insertAdjacentHTML('beforeend',label);
    const count=MP.active?(MP.handCounts[realSeat]||0):G.hands[realSeat].length;
    let cards='<div class="opponent-cards" style="display:flex">';
    for(let i=0;i<count;i++)cards+=`<div class="card card-back mini" style="${i>0?'margin-left:-18px;':''}"></div>`;
    cards+='</div>';
    area.insertAdjacentHTML('beforeend',cards);
  }
}

function renderCenter() {
  const trickArea=document.getElementById('trick-area');
  let html='';
  for(let i=0;i<G.currentTrick.length;i++){
    const entry=G.currentTrick[i];
    const isWinner=G.phase==='trickResult'&&G.trickWinnerIndex===entry.playerIndex;
    const isLead=i===0;
    const name=G.playerNames[entry.playerIndex];
    const dp=getDisplayPos(entry.playerIndex);
    const isMe=entry.playerIndex===MP.mySeat;
    const face=isMe?'🐺':(MP.active&&!isAIPlayer(entry.playerIndex)?'🙂':getFace(name));
    html+=`<div class="trick-card pos-${dp}">`;
    if(isLead)html+=`<div class="lead-badge">lead</div>`;
    html+=cardHTML(entry.card,isWinner?'winner-highlight':'');
    html+=`<div class="trick-label ${isLead?'lead-label':''}">${face} ${name}</div></div>`;
  }
  trickArea.innerHTML=html;
  const trumpArea=document.getElementById('trump-display-area');
  if(G.trumpCard)trumpArea.innerHTML=`<div class="label">Trump</div>${cardHTML(G.trumpCard,'')}`;
  else trumpArea.innerHTML=`<div class="label" style="background:rgba(0,0,0,0.3);padding:6px 12px;border-radius:4px;font-size:14px">No Trump</div>`;
}

function renderHand() {
  const seat=MP.mySeat, hand=G.hands[seat]||[];
  const ledSuit=G.currentTrick.length>0?G.currentTrick[0].card.suit:null;
  const isMyTurn=G.phase==='playing'&&currentPlayerToAct()===seat;
  const legal=isMyTurn?getLegalMoves(hand,ledSuit,G.trumpSuit):[];
  const isAutoPlay=isMyTurn&&legal.length===1;
  let html='';
  for(const card of hand){
    const isLegal=legal.some(c=>c.rank===card.rank&&c.suit===card.suit);
    let cls=isMyTurn?(isLegal?'playable':'illegal'):'';
    if(isAutoPlay&&isLegal)cls+=' auto-play-glow';
    const onclick=isMyTurn&&isLegal?`onclick="humanPlayCard('${card.rank}','${card.suit}')"`:'' ;
    const sym=SUIT_SYMBOL[card.suit];
    html+=`<div class="card ${SUIT_COLOR[card.suit]} ${cls}" ${onclick} data-rank="${card.rank}" data-suit="${card.suit}">
      <div class="corner top-left"><span class="rank">${card.rank}</span><span class="suit-sym">${sym}</span></div>
      <div class="center-pip">${sym}</div>
      <div class="corner bottom-right"><span class="rank">${card.rank}</span><span class="suit-sym">${sym}</span></div>
    </div>`;
  }
  if(G.biddingComplete)html+=`<span style="font-size:14px;font-weight:600;margin-left:12px;white-space:nowrap">(${G.tricksWon[seat]}/${G.bids[seat]})</span>`;
  else if(G.bids[seat]!==null)html+=`<span style="font-size:14px;font-weight:600;margin-left:12px;white-space:nowrap">(${G.bids[seat]})</span>`;
  document.getElementById('hand-area').innerHTML=html;
}

function lastTrickHTML() {
  const lt=G.lastTrick;if(!lt)return '';
  const trumpStr=G.trumpSuit?`${SUIT_SYMBOL[G.trumpSuit]} trump`:'no trump';
  const parts=lt.entries.map((e,i)=>{
    const sym=SUIT_SYMBOL[e.card.suit];
    const col=SUIT_COLOR[e.card.suit]==='red'?'#e44':'#fff';
    const isWinner=e.playerIndex===lt.winnerIndex;
    const isLead=i===0;
    const name=G.playerNames[e.playerIndex];
    return `<span class="lt-entry${isWinner?' lt-winner':''}${isLead?' lt-lead':''}" title="${name}${isLead?' (led)':''}"><span style="color:${col}">${e.card.rank}${sym}</span>${isLead?'↑':''}${isWinner?'✓':''}</span>`;
  });
  return `<span class="lt-log">Last [${trumpStr}]: ${parts.join(' · ')} <span class="lt-reason">(${lt.reason})</span></span>`;
}

function renderActionBar() {
  const bar=document.getElementById('action-bar'), seat=MP.mySeat;
  if(G.phase==='bidding'&&G.currentBidderIndex===seat){
    const last=isLastBidder();
    const {valid,forbidden}=getValidBids(G.cardsPerPlayer,G.bids,last);
    let html=`<span class="status-text">Your bid:</span><div class="bid-buttons">`;
    for(let i=0;i<=G.cardsPerPlayer;i++){
      const isValid=valid.includes(i),isForbidden=i===forbidden;
      html+=`<button class="bid-btn ${isForbidden?'forbidden':''}" ${isValid?`onclick="humanBid(${i})"`:' disabled'}${isForbidden?` title="Sum of bids cannot equal ${G.cardsPerPlayer}"`:''} >${i}</button>`;
    }
    html+=`</div><button id="suggest-btn" onclick="toggleBidSuggestion()">Suggest</button>`;
    bar.innerHTML=html;
  } else if(G.phase==='bidding'){
    bar.innerHTML=`<span class="status-text">${G.playerNames[G.currentBidderIndex]} is bidding...</span>`;
  } else if(G.phase==='playing'&&currentPlayerToAct()===seat){
    const leading=G.currentTrick.length===0;
    const ledSuit=leading?null:G.currentTrick[0].card.suit;
    const legal=getLegalMoves(G.hands[seat],ledSuit,G.trumpSuit);
    let main='';
    if(legal.length===1)main=`<span class="status-text">Auto-playing your only card...</span>`;
    else main=`<span class="status-text">Your turn${leading?' — you lead':''} — click a card</span><button id="suggest-btn" onclick="toggleSuggestion()">Suggest</button>`;
    bar.innerHTML=main+(leading&&G.lastTrick?lastTrickHTML():'');
  } else if(G.phase==='playing'){
    const leading=G.currentTrick.length===0;
    bar.innerHTML=`<span class="status-text">${G.playerNames[currentPlayerToAct()]} is playing...</span>`+(leading&&G.lastTrick?lastTrickHTML():'');
  } else if(G.phase==='trickResult'){
    bar.innerHTML=`<span class="status-text">${G.playerNames[G.trickWinnerIndex]} wins the trick!</span>`;
  } else bar.innerHTML='';
}

// ─── Human Actions ───
function humanBid(bid) {
  if(G.phase!=='bidding'||G.currentBidderIndex!==MP.mySeat) return;
  if(MP.active&&!MP.isHost) mpSendAction({type:'bid',bid});
  else placeBid(MP.mySeat,bid);
}

function humanPlayCard(rank,suit) {
  if(G.phase!=='playing'||currentPlayerToAct()!==MP.mySeat) return;
  const hand=G.hands[MP.mySeat];
  const card=hand.find(c=>c.rank===rank&&c.suit===suit);
  if(!card) return;
  const ledSuit=G.currentTrick.length>0?G.currentTrick[0].card.suit:null;
  if(!getLegalMoves(hand,ledSuit,G.trumpSuit).some(c=>c.rank===rank&&c.suit===suit)) return;
  clearAutoPlay(); clearSuggestion();
  if(MP.active&&!MP.isHost) mpSendAction({type:'play',rank,suit});
  else playCard(MP.mySeat,card);
}

function clearSuggestion() {
  const box=document.getElementById('suggestion-box');
  if(box)box.remove();
  suggestionVisible=false;
  document.querySelectorAll('.card.suggested').forEach(el=>el.classList.remove('suggested'));
}

function toggleBidSuggestion() {
  const box=document.getElementById('suggestion-box');
  if(box){box.remove();return;}
  const hand=G.hands[MP.mySeat], cpp=G.cardsPerPlayer;
  let estimate=0; const reasons=[];
  const suitCards={};for(const s of SUITS)suitCards[s]=[];
  for(const c of hand)suitCards[c.suit].push(c);
  for(const s of SUITS)suitCards[s].sort((a,b)=>RANK_VALUE[b.rank]-RANK_VALUE[a.rank]);
  for(const suit of SUITS){
    const cards=suitCards[suit];if(!cards.length)continue;
    const isTrump=G.trumpSuit&&suit===G.trumpSuit,sym=SUIT_SYMBOL[suit];
    for(const card of cards){
      const val=RANK_VALUE[card.rank];
      if(isTrump){if(val>=13){estimate+=0.9;reasons.push(`${card.rank}${sym} is a high trump`);}else if(val>=11){estimate+=0.5;reasons.push(`${card.rank}${sym} is a mid trump`);}else estimate+=0.15;}
      else{if(val===14){estimate+=0.85;reasons.push(`${card.rank}${sym} is an Ace`);}else if(val===13){const ha=cards.some(c=>c.rank==='A');estimate+=ha?0.6:0.45;reasons.push(ha?`${card.rank}${sym} backed by Ace`:`${card.rank}${sym} without Ace`);}else if(val===12){estimate+=cards.some(c=>RANK_VALUE[c.rank]>12)?0.25:0.12;}}
    }
  }
  if(G.trumpSuit){const tc=(suitCards[G.trumpSuit]||[]).length;for(const s of SUITS){if(s!==G.trumpSuit&&suitCards[s].length===0&&tc>0){estimate+=0.35;reasons.push(`Void in ${SUIT_SYMBOL[s]} — can trump in`);}}}
  if(!G.trumpSuit)estimate*=1.1;
  let suggestedBid=Math.round(estimate);suggestedBid=Math.max(0,Math.min(cpp,suggestedBid));
  const{valid}=getValidBids(cpp,G.bids,isLastBidder());
  if(!valid.includes(suggestedBid)){suggestedBid=suggestedBid>0?suggestedBid-1:suggestedBid+1;suggestedBid=Math.max(0,Math.min(cpp,suggestedBid));}
  document.body.insertAdjacentHTML('beforeend',`<div id="suggestion-box">Suggested bid: <span class="suggestion-card">${suggestedBid}</span><div class="suggestion-reason">${reasons.slice(0,4).join('. ')||'Weak hand — bid conservatively.'}</div></div>`);
}

// ─── LocalStorage Persistence ───
function saveState() { try{localStorage.setItem('wist-mp-state',JSON.stringify(G));}catch(e){} }
function loadSavedState() {
  try{const raw=localStorage.getItem('wist-mp-state');if(!raw)return null;const s=JSON.parse(raw);return(s&&s.phase&&s.phase!=='dealing'&&s.roundSequence)?s:null;}catch(e){return null;}
}
function clearSavedState() { try{localStorage.removeItem('wist-mp-state');}catch(e){} }

function resumeGame() {
  const saved=loadSavedState(); if(!saved)return;
  G=saved;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('history-btn').style.display='block';document.getElementById('download-btn').style.display='block';
  renderAll();
  if(G.phase==='bidding'&&G.currentBidderIndex!==0)setTimeout(processAIBid,600);
  else if(G.phase==='playing'&&currentPlayerToAct()!==0)setTimeout(processAIPlay,500);
  else if(G.phase==='playing'&&currentPlayerToAct()===0)checkAutoPlay();
}

// ─── Save Hooks ───
const _origPlaceBid=placeBid;
placeBid=function(p,b){_origPlaceBid(p,b);if(!MP.active)saveState();else if(MP.isHost)mpPushGameState();};

const _origPlayCard=playCard;
playCard=function(p,c){_origPlayCard(p,c);if(!MP.active)saveState();else if(MP.isHost)mpPushGameState();};

const _origEndRound=endRound;
endRound=function(){_origEndRound();if(!MP.active)saveState();else if(MP.isHost)mpPushGameState();};

const _origResetGame=resetGame;
resetGame=function(){_origResetGame();if(!MP.active)clearSavedState();};

// ════════════════════════════════════════════════════
// ── MULTIPLAYER LAYER ──
// ════════════════════════════════════════════════════

function mpInit() {
  if(MP.db) return Promise.resolve();
  firebase.initializeApp(FIREBASE_CONFIG);
  MP.db=firebase.database();
  MP.auth=firebase.auth();
  return MP.auth.signInAnonymously().then(r=>{MP.uid=r.user.uid;});
}

let mpSelectedCount=0;

function mpSelectCount(n) {
  mpSelectedCount=n;
  document.querySelectorAll('.mp-count-btn').forEach(b=>b.classList.remove('selected'));
  event.target.classList.add('selected');
  updateCreateBtn();
}

function updateCreateBtn() {
  const name=document.getElementById('host-name-input').value.trim();
  document.getElementById('mp-create-btn').disabled=!(name.length>=1&&mpSelectedCount>=3);
}

function mpCreateSession() {
  const name=document.getElementById('host-name-input').value.trim();
  if(!name||mpSelectedCount<3) return;
  mpInit().then(()=>{
    const code=Math.random().toString(36).slice(2,6).toUpperCase();
    MP.sessionId=code; MP.isHost=true; MP.mySeat=0; MP.active=true;
    MP.selectedCount=mpSelectedCount;
    MP.players={[MP.uid]:{seat:0,name}};
    MP.handCounts=new Array(mpSelectedCount).fill(0);
    MP.db.ref(`sessions/${code}`).set({numPlayers:mpSelectedCount,host:MP.uid,phase:'lobby',players:{[MP.uid]:{seat:0,name}}}).then(()=>{
      showLobbyScreen(code,mpSelectedCount);
      mpListenLobby();
    });
  });
}

function showLobbyScreen(code,numPlayers) {
  document.getElementById('mp-setup-screen').classList.remove('active');
  document.getElementById('lobby-screen').classList.add('active');
  document.getElementById('lobby-code').textContent=code;
  document.getElementById('lobby-link-input').value=`${location.origin}${location.pathname}?join=${code}`;
  renderLobby(numPlayers,{[MP.uid]:{seat:0,name:document.getElementById('host-name-input').value.trim()}});
}

function copyLobbyLink() {
  const val=document.getElementById('lobby-link-input').value;
  navigator.clipboard.writeText(val).then(()=>{
    const btn=document.querySelector('.copy-btn');btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy link',1500);
  });
}

function mpListenLobby() {
  MP.db.ref(`sessions/${MP.sessionId}/players`).on('value',snap=>{
    const players=snap.val()||{};
    MP.players=players;
    renderLobby(MP.selectedCount,players);
    document.getElementById('lobby-start-btn').disabled=false;
  });
}

function renderLobby(numPlayers,players) {
  const seatMap={};
  Object.values(players).forEach(p=>seatMap[p.seat]=escapeHtml(p.name));
  let html='';
  for(let i=0;i<numPlayers;i++){
    const name=seatMap[i],filled=!!name,isHost=i===0;
    html+=`<div class="lobby-seat ${filled?'filled':''} ${isHost?'host-seat':''}"><div class="seat-name">${name||(isHost?'…':'Open')}</div><div class="seat-status">${isHost?'Host':filled?'Player':'Waiting…'}</div></div>`;
  }
  document.getElementById('lobby-players').innerHTML=html;
}

function mpHostStartGame() {
  if(!MP.isHost) return;
  const aiNames={3:['Viktor','Sasha'],4:['Viktor','Sasha','Sniper'],5:['Viktor','Sasha','Sniper','Katya'],6:['Viktor','Sasha','Sniper','Katya','Tempo2']};
  const aiSlots=aiNames[MP.selectedCount];
  const seatMap={};Object.values(MP.players).forEach(p=>seatMap[p.seat]=escapeHtml(p.name));
  // Freeze human seats so isAIPlayer() stays correct throughout the game
  MP.humanSeats = new Set(Object.values(MP.players).map(p => p.seat));
  const playerNames=[];let aiIdx=0;
  for(let i=0;i<MP.selectedCount;i++) playerNames.push(seatMap[i]||(aiSlots[aiIdx++]||`Bot${i}`));

  document.getElementById('lobby-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('history-btn').style.display='block';document.getElementById('download-btn').style.display='block';
  document.getElementById('end-game-btn').style.display='block';
  document.getElementById('chat-widget').style.display='flex';

  initState(MP.selectedCount);
  G.playerNames=playerNames;
  MP.handCounts=new Array(MP.selectedCount).fill(0);

  MP.db.ref(`sessions/${MP.sessionId}/phase`).set('playing');
  MP.db.ref(`sessions/${MP.sessionId}/playerNames`).set(playerNames);

  localStorage.setItem('mpHostSession', JSON.stringify({sessionId:MP.sessionId, name:seatMap[0]||''}));

  startRound();
  mpListenActions();
  mpListenChat();
}

function mpShowJoin(code) {
  document.getElementById('mp-setup-screen').classList.remove('active');
  document.getElementById('join-screen').classList.add('active');
  document.getElementById('join-code-display').textContent=code;
}

function mpCompleteJoin() {
  const name=document.getElementById('join-name-input').value.trim();
  const code=document.getElementById('join-code-display').textContent;
  if(!name){document.getElementById('join-status').textContent='Please enter your name.';return;}
  document.getElementById('join-btn').disabled=true;
  document.getElementById('join-status').textContent='Connecting…';
  mpInit().then(()=>{
    MP.db.ref(`sessions/${code}`).once('value').then(snap=>{
      const session=snap.val();
      if(!session){document.getElementById('join-status').textContent='Session not found.';document.getElementById('join-btn').disabled=false;return;}
      const numPlayers=session.numPlayers;
      const myEntry=session.players&&session.players[MP.uid];
      // Block strangers from joining a game already in progress
      if(!myEntry&&(session.phase==='playing'||session.phase==='ended')){
        document.getElementById('join-status').textContent='Game already in progress.';
        document.getElementById('join-btn').disabled=false;
        return;
      }
      let seat;
      if(myEntry){
        seat=myEntry.seat; // reconnect: reuse existing seat
      } else {
        const taken=Object.values(session.players||{}).map(p=>p.seat);
        seat=-1;for(let i=1;i<numPlayers;i++)if(!taken.includes(i)){seat=i;break;}
        if(seat===-1){document.getElementById('join-status').textContent='Session is full.';document.getElementById('join-btn').disabled=false;return;}
      }
      MP.sessionId=code;MP.isHost=false;MP.mySeat=seat;MP.active=true;MP.selectedCount=numPlayers;
      MP.db.ref(`sessions/${code}/players/${MP.uid}`).set({seat,name:myEntry?myEntry.name:name}).then(()=>{
        document.getElementById('join-status').textContent='Joined! Waiting for host…';
        MP.db.ref(`sessions/${code}/phase`).on('value',phSnap=>{
          if(phSnap.val()==='playing'){
            MP.db.ref(`sessions/${code}/playerNames`).once('value').then(ns=>{
              G.playerNames=ns.val()||[];G.numPlayers=numPlayers;
              MP.db.ref(`sessions/${code}/players`).once('value').then(ps=>{
                MP.players=ps.val()||{};
                MP.handCounts=new Array(numPlayers).fill(0);
                G.hands=Array.from({length:numPlayers},()=>[]);
                G.scores=new Array(numPlayers).fill(0);
                document.getElementById('join-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                document.getElementById('history-btn').style.display='block';document.getElementById('download-btn').style.display='block';
                document.getElementById('chat-widget').style.display='flex';
                mpListenGameState();
                mpListenMyHand();
                mpListenHandCounts();
                mpListenChat();
              });
            });
          }
        });
      });
    });
  });
}

function mpPushGameState() {
  if(!MP.isHost) return;
  const pub=Object.assign({},G);delete pub.hands;
  const counts=G.hands.map(h=>h.length);
  // Atomic multi-path update: game state + all hands in one write
  // This prevents the race where mpListenGameState fires before mpListenMyHand
  const updates={};
  updates[`sessions/${MP.sessionId}/game`]=pub;
  updates[`sessions/${MP.sessionId}/handCounts`]=counts;
  for(let i=0;i<G.numPlayers;i++) updates[`sessions/${MP.sessionId}/hands/${i}`]=G.hands[i];
  MP.db.ref('/').update(updates);
  MP.handCounts=counts;
}

function mpPushAllHands() {
  if(!MP.isHost) return;
  for(let i=0;i<G.numPlayers;i++) MP.db.ref(`sessions/${MP.sessionId}/hands/${i}`).set(G.hands[i]);
}

// Firebase drops null array elements and stores empty arrays as null.
// These helpers restore proper JS arrays after receiving state.
function fbToArray(val, len, defaultVal) {
  const arr = new Array(len).fill(defaultVal);
  if (!val) return arr;
  for (let i = 0; i < len; i++) { const v = val[i]; arr[i] = v !== undefined ? v : defaultVal; }
  return arr;
}
function fbToIndexedArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.keys(val).map(Number).sort((a,b)=>a-b).map(k=>val[k]);
}
function fixStateArrays(s) {
  const n = s.numPlayers;
  s.bids         = fbToArray(s.bids, n, null);
  s.tricksWon    = fbToArray(s.tricksWon, n, 0);
  s.scores       = fbToArray(s.scores, n, 0);
  s.currentTrick = fbToIndexedArray(s.currentTrick);
  s.playedCards  = fbToIndexedArray(s.playedCards);
  s.fullDeck     = fbToIndexedArray(s.fullDeck);
  s.roundSequence= fbToIndexedArray(s.roundSequence);
  s.roundHistory = fbToIndexedArray(s.roundHistory).map(h => {
    if (!h) return h;
    h.bids              = fbToArray(h.bids, n, 0);
    h.tricksWon         = fbToArray(h.tricksWon, n, 0);
    h.roundScores       = fbToArray(h.roundScores, n, 0);
    h.cumulativeScores  = fbToArray(h.cumulativeScores, n, 0);
    return h;
  });
  if (s.lastTrick) s.lastTrick.entries = fbToIndexedArray(s.lastTrick.entries);
  s.trickHistory = fbToIndexedArray(s.trickHistory).map(t=>{if(t)t.entries=fbToIndexedArray(t.entries);return t;});
  return s;
}

function mpListenGameState() {
  MP.db.ref(`sessions/${MP.sessionId}/game`).on('value',snap=>{
    const state=snap.val();if(!state)return;
    if(state.phase==='ended'){
      removeOverlays();
      document.getElementById('game-screen').innerHTML='<div style="display:flex;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:20px"><p style="font-size:24px;opacity:0.8">The host ended the game.</p><button class="btn" onclick="location.href=location.pathname">Back to menu</button></div>';
      return;
    }
    const myHand=G.hands&&G.hands[MP.mySeat]?G.hands[MP.mySeat]:[];
    G=fixStateArrays(state);
    if(!G.hands)G.hands=Array.from({length:G.numPlayers},()=>[]);
    G.hands[MP.mySeat]=myHand;
    if(G.phase!=='roundResult'&&G.phase!=='gameOver'){removeOverlays();clearAutoPlay();}
    renderAll();
    // Trigger auto-play / player turn for remote clients
    if(G.phase==='playing' && currentPlayerToAct()===MP.mySeat) checkAutoPlay();
  });
}

function mpListenMyHand() {
  MP.db.ref(`sessions/${MP.sessionId}/hands/${MP.mySeat}`).on('value',snap=>{
    if(!G.hands)G.hands=[];
    const hand=snap.val()||[];  // null = empty array (Firebase drops empty arrays)
    G.hands[MP.mySeat]=hand;
    if(hand.length) sortHand(G.hands[MP.mySeat]);
    renderAll();
    if(G.phase==='playing'&&currentPlayerToAct()===MP.mySeat) checkAutoPlay();
  });
}

function mpListenHandCounts() {
  MP.db.ref(`sessions/${MP.sessionId}/handCounts`).on('value',snap=>{
    const counts=snap.val();
    if(!counts)return;
    // counts may be a sparse object {0:n,1:n,...} if some are 0 — normalize to array
    const arr=Array.isArray(counts)?counts:Object.assign(new Array(G.numPlayers||counts.length).fill(0),counts);
    MP.handCounts=arr;renderAll();
  });
}

function mpSendAction(action) {
  action.uid=MP.uid;action.seat=MP.mySeat;
  MP.db.ref(`sessions/${MP.sessionId}/actions`).push(action);
}

function mpListenActions() {
  if(!MP.isHost) return;
  MP.db.ref(`sessions/${MP.sessionId}/actions`).on('child_added',snap=>{
    const action=snap.val();if(!action)return;
    snap.ref.remove();
    if(action.type==='bid'&&G.phase==='bidding'&&G.currentBidderIndex===action.seat){
      placeBid(action.seat,action.bid);
    } else if(action.type==='play'&&G.phase==='playing'&&currentPlayerToAct()===action.seat){
      const card=G.hands[action.seat].find(c=>c.rank===action.rank&&c.suit===action.suit);
      if(card){
        playCard(action.seat,card);
        // Push the updated hand so the remote player sees their card removed
        MP.db.ref(`sessions/${MP.sessionId}/hands/${action.seat}`).set(G.hands[action.seat]);
      }
    }
  });
}

function mpSendChat() {
  const input=document.getElementById('chat-input');
  const text=input.value.trim();if(!text)return;
  input.value='';
  MP.db.ref(`sessions/${MP.sessionId}/chat`).push({uid:MP.uid,name:G.playerNames[MP.mySeat],seat:MP.mySeat,text,ts:firebase.database.ServerValue.TIMESTAMP});
}

function mpListenChat() {
  MP.db.ref(`sessions/${MP.sessionId}/chat`).orderByChild('ts').startAt(Date.now()).on('child_added',snap=>{
    const msg=snap.val();if(msg)addChatMessage(msg);
  });
}

function addChatMessage(msg) {
  const box=document.getElementById('chat-messages');
  const isMe=msg.uid===MP.uid;
  const div=document.createElement('div');
  div.className=`chat-msg${isMe?' mine':''}`;
  div.innerHTML=`<span class="chat-name">${escapeHtml(msg.name)}</span>: ${escapeHtml(msg.text)}`;
  box.appendChild(div);box.scrollTop=box.scrollHeight;
  if(!document.getElementById('chat-widget').classList.contains('open')&&!isMe)
    document.getElementById('chat-toggle').textContent='💬 Chat (!)';
}

function toggleChat() {
  const w=document.getElementById('chat-widget');
  w.classList.toggle('open');
  document.getElementById('chat-toggle').textContent='💬 Chat';
  if(w.classList.contains('open')){document.getElementById('chat-input').focus();const b=document.getElementById('chat-messages');b.scrollTop=b.scrollHeight;}
}

function escapeHtml(str){return String(str==null?'':str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showSinglePlayerSetup() {
  document.getElementById('mp-setup-screen').classList.remove('active');
  document.getElementById('setup-screen').style.display='flex';
}
function showMultiplayerSetup() {
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('mp-setup-screen').classList.add('active');
}

function mpTryHostReconnect() {
  const saved=JSON.parse(localStorage.getItem('mpHostSession')||'null');
  if(!saved) return Promise.resolve(false);
  return mpInit().then(()=>MP.db.ref(`sessions/${saved.sessionId}`).once('value')).then(snap=>{
    const session=snap.val();
    if(!session||session.host!==MP.uid||session.phase==='ended'){localStorage.removeItem('mpHostSession');return false;}
    return MP.db.ref(`sessions/${saved.sessionId}/game`).once('value').then(gSnap=>{
      const gs=gSnap.val();if(!gs){localStorage.removeItem('mpHostSession');return false;}
      return MP.db.ref(`sessions/${saved.sessionId}/hands`).once('value').then(hSnap=>{
        const rawHands=hSnap.val()||{};
        MP.sessionId=saved.sessionId;MP.isHost=true;MP.mySeat=0;MP.active=true;
        MP.selectedCount=session.numPlayers;MP.players=session.players||{};
        MP.humanSeats=new Set(Object.values(MP.players).map(p=>p.seat));
        G=fixStateArrays(gs);
        G.hands=Array.from({length:G.numPlayers},(_,i)=>rawHands[i]?fbToIndexedArray(rawHands[i]):[]);
        MP.handCounts=G.hands.map(h=>h.length);

        document.getElementById('mp-setup-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        document.getElementById('history-btn').style.display='block';document.getElementById('download-btn').style.display='block';
        document.getElementById('end-game-btn').style.display='block';
        document.getElementById('chat-widget').style.display='flex';

        // Resolve any transient phase before resuming
        if(G.phase==='trickResult'){
          G.currentTrick=[];
          G.phase=G.hands[0].length===0?'roundResult':'playing';
          mpPushGameState();
        }
        renderAll();
        mpListenActions();
        mpListenChat();
        if(G.phase==='playing') scheduleNextPlay();
        else if(G.phase==='bidding') scheduleBidding(G.currentBidderIndex);
        return true;
      });
    });
  }).catch(()=>{localStorage.removeItem('mpHostSession');return false;});
}

// ─── Boot ───
window.addEventListener('DOMContentLoaded',()=>{
  const params=new URLSearchParams(location.search);
  const joinCode=params.get('join');
  if(joinCode){
    const code=joinCode.toUpperCase();
    // Init Firebase first so we have our UID, then check for existing seat
    mpInit().then(()=>{
      MP.db.ref(`sessions/${code}`).once('value').then(snap=>{
        const session=snap.val();
        if(!session){mpShowJoin(code);return;}
        const myEntry=session.players&&session.players[MP.uid];
        if(myEntry){
          // Reconnect: we already have a seat, no need to ask for name
          MP.sessionId=code;MP.isHost=false;MP.mySeat=myEntry.seat;
          MP.active=true;MP.selectedCount=session.numPlayers;
          MP.players=session.players||{};
          if(session.phase==='playing'){
            G.playerNames=session.playerNames||[];G.numPlayers=session.numPlayers;
            MP.handCounts=new Array(session.numPlayers).fill(0);
            G.hands=Array.from({length:session.numPlayers},()=>[]);
            G.scores=new Array(session.numPlayers).fill(0);
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('history-btn').style.display='block';document.getElementById('download-btn').style.display='block';
            document.getElementById('chat-widget').style.display='flex';
            mpListenGameState();mpListenMyHand();mpListenHandCounts();mpListenChat();
          } else {
            // Still in lobby — show join screen with name pre-filled and auto-join
            mpShowJoin(code);
            document.getElementById('join-name-input').value=myEntry.name;
            mpCompleteJoin();
          }
        } else if(session.phase==='playing'||session.phase==='ended') {
          // Stranger hitting the link after game started
          document.getElementById('mp-setup-screen').classList.add('active');
          document.getElementById('mp-setup-screen').insertAdjacentHTML('beforeend','<p style="color:#f99;margin-top:16px">Game already in progress.</p>');
        } else {
          mpShowJoin(code);
        }
      });
    });
  } else {
    mpTryHostReconnect().then(reconnected=>{
      if(reconnected) return;
      document.getElementById('mp-setup-screen').classList.add('active');
      // Show resume button if a single-player save exists
      const saved=loadSavedState();
      if(saved&&!MP.active){
        const setup=document.getElementById('setup-screen');
        const div=document.createElement('div');div.style.marginTop='10px';
        div.innerHTML=`<button class="btn" onclick="resumeGame()" style="background:#5a9;color:#fff;">Resume (Round ${saved.currentRoundIndex+1}/${saved.roundSequence.length})</button>`;
        setup.appendChild(div);
      }
    });
  }
  document.getElementById('host-name-input').addEventListener('input',updateCreateBtn);
  document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')mpSendChat();});
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
